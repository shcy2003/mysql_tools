<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试侧边栏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar {
            height: 100vh;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
        }
        .sidebar ul {
            list-style: none;
            padding-left: 0;
        }
        .sidebar li {
            padding: 0.5rem;
        }
        .sidebar a {
            color: #333;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: #0d6efd;
        }
        .main-content {
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="sidebar col-md-3 col-lg-2">
                <div class="p-3">
                    <h5>MySQL查询平台</h5>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="/">
                            <i class="bi bi-house"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="/queries/sql/">
                            <i class="bi bi-code-square"></i> SQL查询
                        </a>
                    </li>
                    <!-- SQL查询页面的数据库连接选择 -->
                    <li class="nav-item" id="sql-query-connection" style="display: none;">
                        <div class="px-3 py-2">
                            <label class="text-muted small mb-1 d-block">选择连接</label>
                            <select class="form-select form-select-sm" id="sidebar-connection-select">
                                <option value="">请选择连接...</option>
                            </select>
                        </div>
                        <div class="px-3 py-1" id="sidebar-db-container" style="display: none;">
                            <label class="text-muted small mb-1 d-block">选择数据库</label>
                            <select class="form-select form-select-sm" id="sidebar-database-select">
                                <option value="">请选择数据库...</option>
                            </select>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="/queries/history/">
                            <i class="bi bi-clock-history"></i> 查询历史
                        </a>
                    </li>
                </ul>
            </div>

            <!-- 主内容区域 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <h1>测试页面</h1>
                <p>当前路径: <span id="current-path"></span></p>
                <p>isSqlQueryPage(): <span id="is-sql-page"></span></p>
                <p>sql-query-connection 可见性: <span id="visibility"></span></p>
                <button class="btn btn-primary" onclick="testSqlQueryPage()">模拟SQL查询页面</button>
                <button class="btn btn-secondary" onclick="testOtherPage()">模拟其他页面</button>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // 全局变量
        window.selectedConnectionId = null;
        window.selectedDatabase = null;

        // 检查是否在SQL查询页面
        function isSqlQueryPage() {
            const pathname = window.location.pathname;
            return pathname.startsWith('/queries/sql');
        }

        // 初始化侧边栏的数据库连接选择（仅在SQL查询页面）
        function initSidebarConnectionTree() {
            console.log('initSidebarConnectionTree called, path:', window.location.pathname);
            console.log('isSqlQueryPage():', isSqlQueryPage());

            if (!isSqlQueryPage()) {
                $('#sql-query-connection').hide();
                $('#sql-query-connection').css('display', 'none');
                return;
            }

            $('#sql-query-connection').show();
            $('#sql-query-connection').css('display', 'block');
            console.log('Showing sql-query-connection element');
            loadSidebarConnections();
        }

        // 加载连接列表到侧边栏的下拉框
        function loadSidebarConnections() {
            var $select = $('#sidebar-connection-select');
            $select.prop('disabled', true).html('<option value="">加载中...</option>');

            // 模拟API响应
            setTimeout(function() {
                const mockData = {
                    code: 0,
                    data: [
                        { id: 1, name: '本地MySQL' },
                        { id: 2, name: '测试服务器' },
                        { id: 3, name: '生产环境' }
                    ],
                    message: 'success'
                };

                if (mockData.code === 0) {
                    var options = '<option value="">请选择连接...</option>';
                    mockData.data.forEach(function(conn) {
                        options += '<option value="' + conn.id + '">' + conn.name + '</option>';
                    });
                    $select.html(options);
                } else {
                    $select.html('<option value="">加载失败</option>');
                }
                $select.prop('disabled', false);
            }, 1000);
        }

        // 加载数据库列表到侧边栏的下拉框
        function loadSidebarDatabases(connectionId) {
            var $select = $('#sidebar-database-select');
            var $container = $('#sidebar-db-container');

            $select.prop('disabled', true).html('<option value="">加载中...</option>');
            $container.show();
            $container.css('display', 'block');

            // 模拟API响应
            setTimeout(function() {
                const mockData = {
                    code: 0,
                    data: ['test_db', 'production_db', 'analytics_db'],
                    message: 'success'
                };

                if (mockData.code === 0) {
                    var options = '<option value="">请选择数据库...</option>';
                    mockData.data.forEach(function(db) {
                        options += '<option value="' + db + '">' + db + '</option>';
                    });
                    $select.html(options);
                } else {
                    $select.html('<option value="">加载失败</option>');
                }
                $select.prop('disabled', false);
            }, 1000);
        }

        // 侧边栏连接选择事件
        $(document).on('change', '#sidebar-connection-select', function(e) {
            var connectionId = $(this).val();
            if (connectionId) {
                window.selectedConnectionId = parseInt(connectionId);
                loadSidebarDatabases(connectionId);
            } else {
                window.selectedConnectionId = null;
                window.selectedDatabase = null;
                $('#sidebar-db-container').hide();
                $('#sidebar-db-container').css('display', 'none');
            }
        });

        // 侧边栏数据库选择事件
        $(document).on('change', '#sidebar-database-select', function(e) {
            var database = $(this).val();
            if (database) {
                window.selectedDatabase = database;
            } else {
                window.selectedDatabase = null;
            }
        });

        // 测试函数
        function testSqlQueryPage() {
            window.history.pushState({}, '', '/queries/sql/');
            updatePageInfo();
            initSidebarConnectionTree();
        }

        function testOtherPage() {
            window.history.pushState({}, '', '/');
            updatePageInfo();
            initSidebarConnectionTree();
        }

        function updatePageInfo() {
            $('#current-path').text(window.location.pathname);
            $('#is-sql-page').text(isSqlQueryPage());
            $('#visibility').text($('#sql-query-connection').css('display'));
        }

        // 页面加载时初始化
        $(document).ready(function() {
            updatePageInfo();
            initSidebarConnectionTree();
        });
    </script>
</body>
</html>
