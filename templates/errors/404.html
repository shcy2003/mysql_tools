{% extends 'base.html' %}

{% block title %} - 页面未找到{% endblock %}

{% block page_title %}页面未找到{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-12 mb-4">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h5 class="mb-0">
                    <i class="bi bi-exclamation-triangle"></i> 页面未找到
                </h5>
            </div>
            <div class="card-body">
                <div class="text-center">
                    <i class="bi bi-question-circle" style="font-size: 4rem; color: #ffc107; margin-bottom: 20px;"></i>
                    <h4 class="mb-3">页面未找到 (404)</h4>
                    <p class="mb-4">
                        您请求的页面不存在或已被移动到其他位置。
                        请检查您的 URL 是否正确，或返回首页重新导航。
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'query_list' %}" class="btn btn-primary">
                            <i class="bi bi-house"></i> 返回首页
                        </a>
                        <button class="btn btn-secondary" onclick="history.back()">
                            <i class="bi bi-arrow-left"></i> 后退
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
