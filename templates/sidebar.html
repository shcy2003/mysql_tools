<div class="sidebar border border-right p-0 bg-body-tertiary" id="sidebarMenu" style="width: 200px; flex: 0 0 200px;">
    <div class="offcanvas-md offcanvas-end bg-body-tertiary" tabindex="-1" aria-labelledby="sidebarMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="sidebarMenuLabel">MySQL查询平台</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-md-flex flex-column p-0 pt-lg-3 overflow-y-auto">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{% url 'queries:query_list' %}">
                        <i class="bi bi-house"></i>
                        首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{% url 'queries:sql_query' %}">
                        <i class="bi bi-code-square"></i>
                        SQL查询
                    </a>
                </li>
                <!-- SQL查询页面的数据库连接选择 -->
                <li class="nav-item" id="sql-query-connection" style="display: none;">
                    <div class="px-3 py-2">
                        <label class="text-muted small mb-1 d-block">选择连接</label>
                        <select class="form-select form-select-sm" id="sidebar-connection-select">
                            <option value="">请选择连接...</option>
                        </select>
                    </div>
                    <div class="px-3 py-1" id="sidebar-db-container" style="display: none;">
                        <label class="text-muted small mb-1 d-block">选择数据库</label>
                        <select class="form-select form-select-sm" id="sidebar-database-select">
                            <option value="">请选择数据库...</option>
                        </select>
                    </div>
                    <div class="px-3 py-2" id="sidebar-tables-container" style="display: none;">
                        <label class="text-muted small mb-1 d-block">表列表</label>
                        <div id="sidebar-tables-wrapper">
                            <!-- 表列表将在这里渲染 -->
                        </div>
                        <div id="sidebar-tables-pagination" style="display: none;">
                            <!-- 分页控件将在这里渲染 -->
                        </div>
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{% url 'queries:query_history' %}">
                        <i class="bi bi-clock-history"></i>
                        查询历史
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="{% url 'desensitization:masking_rule_list' %}">
                        <i class="bi bi-shield-lock"></i>
                        脱敏规则
                    </a>
                </li>
                {% if user.role == 'admin' %}
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'connections:connection_list' %}">
                            <i class="bi bi-gear"></i>
                            连接管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'environments:environment_list' %}">
                            <i class="bi bi-layers"></i>
                            环境管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-2" href="{% url 'audit:audit_list' %}">
                            <i class="bi bi-file-earmark-text"></i>
                            审计日志
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</div>
