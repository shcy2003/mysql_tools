{% extends "base.html" %}

{% block page_title %}删除环境{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>确认删除</h5>
                </div>
                <div class="card-body">
                    <p>确定要删除环境 <strong>"{{ env.name }}"</strong> 吗？</p>
                    <p class="text-muted">此操作不可恢复！</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>确认删除
                            </button>
                            <a href="{% url 'environments:environment_list' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
