{% extends 'base.html' %}

{% block title %} - 创建连接{% endblock %}

{% block page_title %}创建 MySQL 连接{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-12 mb-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-plus-circle"></i> 创建连接
                </h5>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" id="connection-form">
                    {% csrf_token %}

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="name" class="form-label">{{ form.name.label }}</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ form.name.value|default:'' }}"
                                   placeholder="请输入连接名称" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="host" class="form-label">{{ form.host.label }}</label>
                            <input type="text" class="form-control" id="host" name="host" value="{{ form.host.value|default:'' }}"
                                   placeholder="请输入主机地址" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="port" class="form-label">{{ form.port.label }}</label>
                            <input type="number" class="form-control" id="port" name="port" value="{{ form.port.value|default:3306 }}"
                                   placeholder="请输入端口" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="database" class="form-label">{{ form.database.label }}</label>
                            <input type="text" class="form-control" id="database" name="database" value="{{ form.database.value|default:'' }}"
                                   placeholder="请输入数据库名" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="username" class="form-label">{{ form.username.label }}</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ form.username.value|default:'' }}"
                                   placeholder="请输入用户名" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="password" class="form-label">{{ form.password.label }}</label>
                            <input type="password" class="form-control" id="password" name="password" value="{{ form.password.value|default:'' }}"
                                   placeholder="请输入密码" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="test_connection" name="test_connection" checked>
                                <label class="form-check-label" for="test_connection">
                                    创建后测试连接
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-plus-circle"></i> 创建连接
                            </button>
                            <a href="{% url 'connections:connection_list' %}" class="btn btn-secondary btn-lg">
                                <i class="bi bi-arrow-left"></i> 取消
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
